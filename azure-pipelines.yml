trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerRegistryServiceConnection: 'DockerHub'
  imageRepository: 'yourusername/telegram-bot'
  containerRegistry: 'docker.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
- stage: Test
  displayName: 'Test Stage'
  jobs:
  - job: UnitTests
    displayName: 'Run Unit Tests'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'
        addToPath: true
      displayName: 'Use Python 3.11'

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: 'Install dependencies'

    - script: |
        export TELEGRAM_BOT_TOKEN="test_token"
        pytest tests/ -v --cov=bot --cov-report=xml --cov-report=html
      displayName: 'Run tests with coverage'

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/test-results.xml'
        failTaskOnFailedTests: true
      displayName: 'Publish test results'
      condition: succeededOrFailed()

    - task: PublishCodeCoverageResults@1
      inputs:
        codeCoverageTool: 'Cobertura'
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'
        reportDirectory: '$(System.DefaultWorkingDirectory)/htmlcov'
      displayName: 'Publish coverage results'
      condition: succeededOrFailed()

- stage: Build
  displayName: 'Build Stage'
  dependsOn: Test
  condition: succeeded()
  jobs:
  - job: BuildDocker
    displayName: 'Build Docker Image'
    steps:
    - task: Docker@2
      displayName: 'Build Docker image'
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest

    - task: Docker@2
      displayName: 'Push Docker image'
      inputs:
        command: push
        repository: $(imageRepository)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
      condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToProduction
    displayName: 'Deploy to Production'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'
            displayName: 'Use Python 3.11'

          - script: |
              pip install ansible
            displayName: 'Install Ansible'

          - task: DownloadSecureFile@1
            name: sshKey
            displayName: 'Download SSH Key'
            inputs:
              secureFile: 'id_rsa'

          - task: DownloadSecureFile@1
            name: ansibleVault
            displayName: 'Download Ansible Vault Password'
            inputs:
              secureFile: 'vault_pass.txt'

          - script: |
              mkdir -p ~/.ssh
              cp $(sshKey.secureFilePath) ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa
              ssh-keyscan -H $(SERVER_IP) >> ~/.ssh/known_hosts
            displayName: 'Setup SSH'

          - script: |
              cd ansible
              export TELEGRAM_BOT_TOKEN=$(TELEGRAM_BOT_TOKEN)
              ansible-playbook -i inventory.ini playbook.yml --vault-password-file=$(ansibleVault.secureFilePath)
            displayName: 'Run Ansible Playbook'
            env:
              TELEGRAM_BOT_TOKEN: $(TELEGRAM_BOT_TOKEN)