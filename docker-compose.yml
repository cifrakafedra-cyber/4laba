version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bot-network

  # Сервис для тестирования
  test:
    build: .
    container_name: telegram-bot-tests
    command: pytest tests/ -v --cov=bot --cov-report=term-missing
    env_file:
      - .env
    environment:
      - TELEGRAM_BOT_TOKEN=test_token
    networks:
      - bot-network
    profiles:
      - test

networks:
  bot-network:
    driver: bridge